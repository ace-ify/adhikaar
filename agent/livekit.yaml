# LiveKit Cloud Agent Configuration
# https://docs.livekit.io/cloud/agents/

agent:
  name: adhikaar-agent
  description: India's AI Welfare Copilot - Voice Agent

  # Entrypoint for the agent
  entrypoint: agent.src.agent:adhikaar_session

  # Prewarm function (optional)
  # prewarm: agent.src.agent:prewarm

  # Environment variables to provision
  env:
    - GOOGLE_API_KEY
    - MYSCHEME_API_KEY  # Optional
    - GROQ_API_KEY      # Optional, for text fallback

  # Runtime settings
  timeout:
    idle_timeout: 300  # seconds

  # Resources
  resources:
    memory: 512Mi
    cpu: 1

  # Regions to deploy (closest to users)
  regions:
    - ap-south-1  # Mumbai
    - us-west-2   # Oregon
