services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env.local
    restart: unless-stopped

  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    env_file:
      - ./agent/.env.local
    restart: unless-stopped

volumes:
  evolution_pg_data:
  evolution_redis_data:
